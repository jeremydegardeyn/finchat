# Cloud Workflows — Loan Approval orchestration (ADR-0005).
# Long-running with a native callback for human-in-the-loop approval.
# NOTE: skeleton — full agent calls, BigQuery writes, and risk scoring land in Increment 4.
main:
  params: [input]
  steps:
    - init:
        assign:
          - loan_id: ${input.loan_id}
          - project: ${sys.get_env("GOOGLE_CLOUD_PROJECT_ID")}
    - validate_submission:
        switch:
          - condition: ${not("name" in input) or not("amount" in input) or not("term" in input)}
            raise: "Missing required fields: name, amount, term"
    - create_loan_record:
        # Increment 4: INSERT loan_request row via BigQuery connector
        assign:
          - status: "CREATED"
    - generate_credit_profile:
        # Increment 4: Credit Agent -> synthetic profile -> BigQuery
        assign:
          - status: "PROFILED"
    - retrieve_transaction_history:
        # Increment 4: call Transactions DaaS API (cross-product lineage)
        assign:
          - status: "TXN_REVIEWED"
    - calculate_risk_and_recommend:
        # Increment 4: Risk score + recommendation
        assign:
          - status: "RECOMMENDED"
    - await_human_approval:
        # Increment 4: create_callback_endpoint + await_callback (HITL)
        assign:
          - decision: "PENDING"
    - finalize:
        return:
          loan_id: ${loan_id}
          status: ${status}
