<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>FinChat — Banking Data & AI Platform</title>
<!-- Vega-Lite for rendering Conversational Analytics charts -->
<script src="https://cdn.jsdelivr.net/npm/vega@5"></script>
<script src="https://cdn.jsdelivr.net/npm/vega-lite@5"></script>
<script src="https://cdn.jsdelivr.net/npm/vega-embed@6"></script>
<style>
  :root { --bg:#0f172a; --panel:#1e293b; --ink:#e2e8f0; --mut:#94a3b8; --acc:#38bdf8; --ok:#34d399; --warn:#fbbf24; --bad:#f87171; --line:#334155; }
  * { box-sizing:border-box; } body { margin:0; font:14px/1.5 system-ui,Segoe UI,Roboto,sans-serif; background:var(--bg); color:var(--ink); }
  header { display:flex; align-items:center; gap:16px; padding:12px 20px; background:#0b1220; border-bottom:1px solid var(--line); position:sticky; top:0; z-index:5; }
  header h1 { font-size:16px; margin:0; letter-spacing:.5px; } header .logo { color:var(--acc); font-weight:700; }
  header .spacer { flex:1; }
  select, input, textarea, button { font:inherit; color:var(--ink); background:var(--panel); border:1px solid var(--line); border-radius:8px; padding:8px 10px; }
  button { cursor:pointer; background:var(--acc); color:#04212e; border:none; font-weight:600; }
  button.ghost { background:var(--panel); color:var(--ink); border:1px solid var(--line); font-weight:500; }
  button.bad { background:var(--bad); color:#2a0a0a; } button.ok { background:var(--ok); color:#04231a; } button.warn{ background:var(--warn); color:#2a1f02; }
  .demo-badge { font-size:12px; color:var(--warn); border:1px solid var(--warn); border-radius:999px; padding:2px 10px; }
  nav { display:flex; gap:8px; padding:12px 20px; } nav button.tab { background:transparent; color:var(--mut); border:1px solid transparent; }
  nav button.tab.active { color:var(--acc); border-bottom:2px solid var(--acc); border-radius:0; }
  main { padding:8px 20px 40px; max-width:1100px; margin:0 auto; }
  .grid { display:grid; gap:16px; grid-template-columns:repeat(auto-fit,minmax(300px,1fr)); }
  .card { background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:16px; }
  .card h3 { margin:0 0 12px; font-size:14px; color:var(--acc); }
  label { display:block; font-size:12px; color:var(--mut); margin:8px 0 2px; }
  input, textarea, select { width:100%; }
  table { width:100%; border-collapse:collapse; font-size:13px; } th,td { text-align:left; padding:7px 8px; border-bottom:1px solid var(--line); }
  th { color:var(--mut); font-weight:600; } .pill { padding:1px 8px; border-radius:999px; font-size:11px; border:1px solid var(--line); }
  .pill.APPROVE,.pill.APPROVED,.pill.ok { color:var(--ok); border-color:var(--ok); }
  .pill.DECLINE,.pill.REJECTED,.pill.bad { color:var(--bad); border-color:var(--bad); }
  .pill.REVIEW,.pill.PENDING_APPROVAL,.pill.warn { color:var(--warn); border-color:var(--warn); }
  .row { display:flex; gap:8px; align-items:center; flex-wrap:wrap; } .mut { color:var(--mut); } .right{ text-align:right; }
  pre { background:#0b1220; border:1px solid var(--line); border-radius:8px; padding:10px; overflow:auto; font-size:12px; }
  details.sqlbox { margin:8px 0 2px; }
  details.sqlbox > summary { font-size:12px; color:var(--mut); cursor:pointer; user-select:none; list-style:none; }
  details.sqlbox > summary::-webkit-details-marker { display:none; }
  details.sqlbox > summary::before { content:"\25B8 "; }
  details.sqlbox[open] > summary::before { content:"\25BE "; }
  details.sqlbox pre { margin-top:4px; }
  .chat { height:280px; overflow:auto; background:#0b1220; border:1px solid var(--line); border-radius:8px; padding:10px; }
  .msg { margin:6px 0; } .msg.u { text-align:right; } .msg .b { display:inline-block; padding:6px 10px; border-radius:10px; background:var(--panel); }
  .msg.u .b { background:var(--acc); color:#04212e; }
  .metric { font-size:26px; font-weight:700; } .metric.small{ font-size:18px; }
  .hidden { display:none; }
</style>
</head>
<body>
<header>
  <h1><span class="logo">◆ FinChat</span> Banking Data &amp; AI Platform</h1>
  <span id="demoBadge" class="demo-badge hidden">DEMO DATA</span>
  <div class="spacer"></div>
  <span id="personaBox"><label style="margin:0;color:var(--mut)">Persona&nbsp;</label>
  <select id="persona"></select></span>
  <span id="authbox" class="row" style="gap:8px"></span>
</header>
<nav id="tabs"></nav>
<main id="view"></main>

<script>
const S = { persona:"customer", live:{loan_api:false,txn_api:false,agent:false}, demo:true };

// ---------- embedded demo data (standalone fallback) ----------
const DEMO = {
  accounts: {
    "acct-001": { balance:-2972.49, currency:"USD", deposit_count:6, withdrawal_count:9, fee_count:2, net_balance:-2972.49 },
    "acct-002": { balance:4821.10, currency:"USD", deposit_count:7, withdrawal_count:4, fee_count:1, net_balance:4821.10 },
    "acct-003": { balance:1500.00, currency:"USD", deposit_count:5, withdrawal_count:3, fee_count:0, net_balance:1500.00 },
  },
  txns: {
    "acct-001":[["DEPOSIT",486.03,"POSTED"],["TRANSFER",974.33,"POSTED"],["FEE",35,"POSTED"],["WITHDRAWAL",1200,"POSTED"]],
    "acct-002":[["DEPOSIT",2500,"POSTED"],["WITHDRAWAL",120,"POSTED"],["DEPOSIT",300,"POSTED"]],
    "acct-003":[["DEPOSIT",1500,"POSTED"],["WITHDRAWAL",250,"POSTED"]],
  },
  loans: [
    { loan_id:"loan-demo-1", customer_name:"Jeremy D", amount:15000, term_months:36, status:"PENDING_APPROVAL", risk:{risk_score:47,recommendation:"REVIEW"}, decisions:[] },
    { loan_id:"loan-demo-2", customer_name:"A. Smith", amount:60000, term_months:60, status:"PENDING_APPROVAL", risk:{risk_score:72,recommendation:"DECLINE"}, decisions:[] },
  ],
  audit: { "loan-demo-1":[
    {actor:"loan-api",action:"CREATE_LOAN",event_time:"2026-06-06T10:00:00Z"},
    {actor:"credit-agent",action:"CREDIT_PROFILE",event_time:"2026-06-06T10:00:01Z"},
    {actor:"approval-agent",action:"RISK_ASSESSMENT",event_time:"2026-06-06T10:00:02Z"}
  ]},
};

// ---------- api helper (BFF proxy, demo fallback) ----------
async function api(kind, path, opts={}) {
  try {
    const r = await fetch(`/api/${kind}/${path}`, { ...opts,
      headers:{ "Content-Type":"application/json", "X-Persona":S.persona,
                ...(S.idtok?{"X-User-Token":S.idtok}:{}),
                ...(S.accessTok?{"X-User-Access-Token":S.accessTok}:{}), ...(opts.headers||{}) } });
    if (r.status === 503) throw new Error("demo");
    return await r.json();
  } catch(e) { return { __demo:true }; }
}

// ---------- views ----------
const VIEWS = {
  customer: { label:"Banking Assistant", render: renderCustomerChat },
  loans:    { label:"Loans", render: renderCustomerLoans },
  employee: { label:"Loan Officer", render: renderEmployee },
  analyst:  { label:"Analyst", render: renderAnalyst },
  admin:    { label:"Platform Admin", render: renderAdmin },
  steward:  { label:"Steward", render: renderSteward },
};
// Ask-the-Data (free-form Conversational Analytics) is a STAFF capability. The
// anonymous customer gets only the DaaS-grounded banking assistant (tools), not
// arbitrary SQL over the data products. Staff personas see what their own
// credentials allow (values / masked / denied), ADR-0019. Anonymous customer
// splits the assistant chat and loan request/status onto separate tabs.
function viewsFor(p){ return p==="customer"?["customer","loans"]:p==="employee"?["employee","steward","analyst"]:p==="analyst"?["analyst"]:["admin","steward","analyst"]; }
let activeTab = "customer";

function setTabs() {
  const allowed = viewsFor(S.persona);
  // Staff land on the Analyst (Ask-the-Data) tab by default; anonymous customer
  // lands on the Banking Assistant chat.
  activeTab = allowed.includes("analyst") ? "analyst" : allowed[0];
  tabs.innerHTML = allowed.map(v=>`<button class="tab ${v===activeTab?'active':''}" data-v="${v}">${VIEWS[v].label} View</button>`).join("");
  tabs.querySelectorAll("button").forEach(b=>b.onclick=()=>{ activeTab=b.dataset.v;
    tabs.querySelectorAll("button").forEach(x=>x.classList.toggle("active",x.dataset.v===activeTab)); draw(); });
  draw();
}
function draw(){ clearInterval(S._stewardTimer); VIEWS[activeTab].render(); }
const el = id => document.getElementById(id);

// ---------- explainability: render the loan risk scorecard ----------
function parseFactors(x){ if(!x) return []; if(Array.isArray(x)) return x; try{ return JSON.parse(x); }catch(e){ return []; } }
function loanRisk(l){ return {
  risk_score:(l.risk&&l.risk.risk_score)??l.risk_score,
  recommendation:(l.risk&&l.risk.recommendation)||l.final_decision||l.recommendation,
  factors:l.factors, principal_reasons:l.principal_reasons, model_version:l.model_version }; }
function riskExplainHtml(o){
  const rec=o.recommendation||"-";
  const factors=parseFactors(o.factors), pr=o.principal_reasons||[];
  let h=`<div class="row" style="justify-content:space-between"><div><span class="metric small">${o.risk_score==null?'–':o.risk_score}</span> <span class="mut">/100 risk</span></div><span class="pill ${rec}">${rec}</span></div>`;
  if(factors.length){
    h+=`<table style="margin-top:8px"><thead><tr><th>Factor</th><th>Value</th><th class="right">Contribution</th><th>Reason</th></tr></thead><tbody>${
      factors.map(f=>`<tr><td>${escapeHtml(f.label||f.code)}</td><td class="mut">${escapeHtml(f.value)}</td>
        <td class="right"><span class="pill ${f.points>0?'warn':'ok'}">+${f.points}/${f.max_points}</span></td>
        <td class="mut">${escapeHtml(f.note||'')}</td></tr>`).join("")}</tbody></table>`;
    h+= pr.length
      ? `<div style="margin-top:8px"><b>Principal reasons</b> <span class="mut">(adverse-action / Reg B)</span>: ${pr.map(escapeHtml).join("; ")}</div>`
      : `<div class="mut" style="margin-top:8px">No risk-increasing factors — all favorable.</div>`;
  } else { h+=`<div class="mut" style="margin-top:6px">${(o.reasons||[]).join("; ")||"No factor breakdown available."}</div>`; }
  h+=`<div class="mut" style="font-size:11px;margin-top:6px">Model ${escapeHtml(o.model_version||'risk-1.0.0')} · transparent additive scorecard · fully auditable</div>`;
  return h;
}

// ===== CUSTOMER =====
// Anonymous customer surface, split across two tabs: the grounded Banking
// Assistant chat (this) and loan request/status (renderCustomerLoans).
function renderCustomerChat() {
  view.innerHTML = `
  <div class="grid">
    <div class="card" style="grid-column:1/-1"><h3>Chat with Banking Assistant</h3>
      <div class="row"><label style="margin:0">Account&nbsp;</label><input id="cacc" style="width:200px" value="${(S.sampleAccounts&&S.sampleAccounts[0])||'acct-001'}"></div>
      <div id="chat" class="chat" style="margin-top:8px"></div>
      <div class="row" style="margin-top:8px"><input id="cmsg" placeholder="e.g. what is my balance?" style="flex:1"><button id="csend">Send</button></div>
      <div id="cex" class="row" style="margin-top:8px;gap:6px;flex-wrap:wrap"></div>
    </div>
  </div>`;
  el("csend").onclick = chatSend;
  el("cmsg").addEventListener("keydown",e=>{ if(e.key==="Enter") chatSend(); });
  const cExamples = ["what is my balance?", "show my recent transactions", "give me an account summary",
                     "what are the overdraft fees?", "when is the Lakewood branch open?"];
  el("cex").innerHTML = `<span class="mut" style="font-size:12px;align-self:center">try:</span>` +
    cExamples.map(x=>`<button class="ghost fq">${escapeHtml(x)}</button>`).join("");
  el("cex").querySelectorAll("button.fq").forEach(b=>b.onclick=()=>{ el("cmsg").value=b.textContent; chatSend(); });
  pushChat("a","Hi! I'm FinChat. Ask me about your balance, recent transactions, an account summary — or bank policies, fees, and branch hours.");
}
function renderCustomerLoans() {
  view.innerHTML = `
  <div class="grid">
    <div class="card"><h3>Submit Loan Request</h3>
      <label>Full name</label><input id="ln" value="Jeremy D">
      <label>Amount (USD)</label><input id="la" type="number" value="15000">
      <label>Term (months)</label><input id="lt" type="number" value="36">
      <label>Account id (optional)</label><input id="lacc" value="${(S.sampleAccounts&&S.sampleAccounts[0])||'acct-001'}">
      <div class="row" style="margin-top:12px"><button id="lsub">Submit</button></div>
      <div id="lres" class="hidden" style="margin-top:10px"></div>
    </div>
    <div class="card"><h3>View Loan Status</h3>
      <label>Loan id</label><input id="lsid" placeholder="loan-...">
      <div class="row" style="margin-top:12px"><button class="ghost" id="lsget">Check status</button></div>
      <div id="lsout"></div>
    </div>
  </div>`;
  el("lsub").onclick = submitLoan; el("lsget").onclick = checkStatus;
}
async function submitLoan() {
  const body = { customer_name:el("ln").value, amount:+el("la").value, term_months:+el("lt").value, account_id:el("lacc").value||null };
  let res = await api("loan","v1/loans",{ method:"POST", body:JSON.stringify(body) });
  if (res.__demo) { const score = body.amount>40000?72:47; res = { loan_id:"loan-demo-"+Math.floor(Math.random()*9000),
    status:"PENDING_APPROVAL", risk_score:score, recommendation:score>=65?"DECLINE":score<=35?"APPROVE":"REVIEW", reasons:["demo scoring"] }; }
  const p = el("lres"); p.classList.remove("hidden");
  p.innerHTML = `<div class="mut" style="font-size:12px">Loan ${res.loan_id||''} · ${res.status||''}</div>`
              + `<h3 style="margin:6px 0 4px">Why this decision</h3>` + riskExplainHtml(res);
}
async function checkStatus() {
  const id = el("lsid").value.trim(); if(!id) return;
  let res = await api("loan",`v1/loans/${id}`);
  if (res.__demo) res = DEMO.loans.find(l=>l.loan_id===id) || {error:"not found (demo)"};
  el("lsout").innerHTML = `<pre>${JSON.stringify(res,null,2)}</pre>`;
}
function pushChat(who,text){ const d=document.createElement("div"); d.className="msg "+(who==="u"?"u":"a");
  d.innerHTML=`<span class="b"></span>`; d.querySelector(".b").textContent=text; el("chat").appendChild(d); el("chat").scrollTop=1e9; return d; }
async function chatSend() {
  const q = el("cmsg").value.trim(); if(!q) return; const acc = el("cacc").value.trim();
  pushChat("u",q); el("cmsg").value="";
  const thinking = pushChat("a","…");
  let ans = await agentAnswer(q, acc);
  thinking.querySelector(".b").textContent = ans;  // replace placeholder
  el("chat").scrollTop=1e9;
}
// Call the real ADK+Gemini agent via the BFF (/api/agent -> OIDC -> private agent).
// Falls back to client-side grounding if the agent is unavailable (demo mode).
async function agentAnswer(q, acc) {
  if (!S.sid) S.sid = "s-" + Date.now();
  const message = acc ? `(account ${acc}) ${q}` : q;
  let res = await api("agent","chat",{ method:"POST",
    body: JSON.stringify({ message, user_id: S.persona, session_id: S.sid }) });
  if (res.__demo || res.error || !res.response) return await groundedAnswer(q, acc);
  return res.response;
}
async function groundedAnswer(q, acc) {
  const ql=q.toLowerCase();
  if(/balance|how much/.test(ql)){ let b=await api("txn",`v1/accounts/${acc}/balance`);
    if(b.__demo){ const d=DEMO.accounts[acc]; b=d?{balance:d.balance,currency:d.currency}:{error:1}; }
    return (b.error||b.balance==null)?`I couldn't find a balance for ${acc}.`:`Your balance on ${acc} is ${b.balance} ${b.currency}.`; }
  if(/summary|overview/.test(ql)){ let s=await api("txn",`v1/accounts/${acc}/summary`);
    if(s.__demo){ const d=DEMO.accounts[acc]; s=d?{deposit_count:d.deposit_count,withdrawal_count:d.withdrawal_count,net_balance:d.net_balance}:{error:1}; }
    return s.error?`No data for ${acc}.`:`${acc}: ${s.deposit_count} deposits, ${s.withdrawal_count} withdrawals, net ${s.net_balance}.`; }
  if(/transaction|recent|spent|activity/.test(ql)){ let t=await api("txn",`v1/accounts/${acc}/transactions?limit=5`);
    if(t.__demo){ const d=DEMO.txns[acc]||[]; return d.length?("Recent: "+d.map(x=>`${x[0]} ${x[1]}`).join(", ")):`No transactions for ${acc}.`; }
    return Array.isArray(t)&&t.length?("Recent: "+t.map(x=>`${x.txn_type} ${x.amount}`).join(", ")):`No transactions for ${acc}.`; }
  if(/invest|stock|advice/.test(ql)) return "I can't provide investment advice, but I can share your account data.";
  return "I can share your balance, recent transactions, or an account summary. Try 'what is my balance?'";
}

// ===== EMPLOYEE =====
async function renderEmployee() {
  view.innerHTML = `<div class="card"><h3>Loan Requests — Review Queue</h3><div id="lq">Loading…</div></div>
    <div class="card" style="margin-top:16px"><h3>Decision Explanation</h3><div id="whybox" class="mut">Select <b>Why</b> on a loan to see the risk scorecard and the principal (adverse-action) reasons.</div></div>
    <div class="card" style="margin-top:16px"><h3>Audit Trail</h3><div id="auditbox" class="mut">Select a loan to view its immutable audit trail.</div></div>`;
  let loans = await api("loan","v1/loans");
  if (loans.__demo || !Array.isArray(loans)) { loans = DEMO.loans; }
  S.empLoans = loans;
  el("lq").innerHTML = `<table><thead><tr><th>Loan</th><th>Customer</th><th class="right">Amount</th><th>Term</th><th>Risk</th><th>Status</th><th>Actions</th></tr></thead><tbody>${
    loans.map(l=>{ const rec=(l.risk&&l.risk.recommendation)||l.recommendation||"-"; const rs=(l.risk&&l.risk.risk_score)??l.risk_score??"-";
    return `<tr>
      <td>${l.loan_id}</td><td>${l.customer_name}</td><td class="right">${l.amount}</td><td>${l.term_months}</td>
      <td><span class="pill ${rec}" style="white-space:nowrap">${rs} ${rec}</span></td>
      <td><span class="pill ${l.status}" style="white-space:nowrap">${l.status}</span></td>
      <td>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px;width:330px">
          <button class="ok" data-d="APPROVE" data-id="${l.loan_id}">Approve</button>
          <button class="bad" data-d="REJECT" data-id="${l.loan_id}">Reject</button>
          <button class="warn" data-d="REQUEST_MODIFICATION" data-id="${l.loan_id}">Modify</button>
          <button class="ghost" data-d="COUNTEROFFER" data-id="${l.loan_id}">Counter</button>
          <button class="ghost" data-w="${l.loan_id}">Why</button>
          <button class="ghost" data-a="${l.loan_id}">Audit</button>
        </div>
      </td></tr>`; }).join("")}</tbody></table>`;
  el("lq").querySelectorAll("button[data-d]").forEach(b=>b.onclick=()=>decide(b.dataset.id,b.dataset.d));
  el("lq").querySelectorAll("button[data-w]").forEach(b=>b.onclick=()=>showWhy(b.dataset.w));
  el("lq").querySelectorAll("button[data-a]").forEach(b=>b.onclick=()=>showAudit(b.dataset.a));
}
function showWhy(id){
  const l=(S.empLoans||[]).find(x=>x.loan_id===id); if(!l) return;
  el("whybox").classList.remove("mut");
  el("whybox").innerHTML = `<div class="mut" style="font-size:12px;margin-bottom:6px">${l.customer_name||''} · ${l.loan_id}</div>` + riskExplainHtml(loanRisk(l));
}
async function decide(id, decision) {
  let body = { decision, rationale: "reviewed in console" };
  if (decision==="COUNTEROFFER") { const a=prompt("Counteroffer amount:"); if(!a) return; body.counteroffer_amount=+a; }
  let res = await api("loan",`v1/loans/${id}/decision`,{ method:"POST", body:JSON.stringify(body),
    headers:{ "X-Approver":"loan-officer@datadinosaur.com" } });
  if (res.__demo) { const l=DEMO.loans.find(x=>x.loan_id===id); if(l){ l.status={APPROVE:"APPROVED",REJECT:"REJECTED",REQUEST_MODIFICATION:"MODIFIED",COUNTEROFFER:"MODIFIED"}[decision];
    l.decisions.push({version:l.decisions.length+1,decision}); } res={decision,version:(l?l.decisions.length:1)}; }
  alert(`Recorded ${res.decision} (v${res.version}) — append-only & audited.`); renderEmployee();
}
async function showAudit(id) {
  let a = await api("loan",`v1/loans/${id}/audit`);
  if (a.__demo || !Array.isArray(a)) a = DEMO.audit[id] || [];
  el("auditbox").innerHTML = a.length? `<table><thead><tr><th>Time</th><th>Actor</th><th>Action</th></tr></thead><tbody>${
    a.map(x=>`<tr><td class="mut">${x.event_time||""}</td><td>${x.actor}</td><td>${x.action}</td></tr>`).join("")}</tbody></table>`
    : `<span class="mut">No audit entries for ${id}.</span>`;
}

// ===== ANALYST (Employee) =====
function escapeHtml(s){ return String(s==null?"":s).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c])); }
function fmtCell(v){ if(v===null||v===undefined) return ""; if(typeof v==="number") return v.toLocaleString();
  return escapeHtml(typeof v==="object"?JSON.stringify(v):v); }
function pushAChat(who,text){ const d=document.createElement("div"); d.className="msg "+(who==="u"?"u":"a");
  d.innerHTML=`<span class="b"></span>`; d.querySelector(".b").textContent=text; el("achat").appendChild(d); el("achat").scrollTop=1e9; return d; }

function renderAnalyst(){
  // Catalog discovery is an analyst/approver tool; the Platform Admin screen omits it.
  const catalogCard = S.persona === "admin" ? "" : `
    <div class="card" style="grid-column:1/-1"><h3>Knowledge Catalog — discover data products by description</h3>
      <div class="row"><input id="catq" style="flex:1" placeholder="e.g. overdraft history, authoritative customer record, credit exposure, knowledge base">
        <button id="catbtn">Search</button></div>
      <div id="catout" class="mut" style="margin-top:10px">Search the Dataplex Universal Catalog by business concept — returns governed assets with owner, PII class, contract, and data-quality.</div>
    </div>`;
  view.innerHTML = `
  <div class="grid">
    ${catalogCard}
    <div class="card" style="grid-column:1/-1"><h3>Ask the Data <span class="pill">Conversational Analytics</span> <span class="pill">Knowledge Base · RAG</span></h3>
      <div class="mut" style="font-size:12px;margin-bottom:6px">One assistant — it reads your question and routes it to <b>📊 Analytics</b> (queries the data products, shows the SQL) or the <b>📚 Knowledge Base</b> (policy/doc RAG) automatically. The badge on each answer shows which it used.</div>
      <div id="achat" class="chat" style="height:260px"></div>
      <div class="row" style="margin-top:8px"><input id="amsg" style="flex:1" placeholder="ask anything — e.g. 'total deposits by segment'  ·  'what are the overdraft fees?'"><button id="asend">Ask</button></div>
      <div id="aex" class="row" style="margin-top:8px;gap:6px;flex-wrap:wrap"></div>
      <div id="asql" style="margin-top:10px"></div>
    </div>
  </div>`;
  if (el("catbtn")) {
    el("catbtn").onclick = catalogSearch;
    el("catq").addEventListener("keydown",e=>{ if(e.key==="Enter") catalogSearch(); });
  }
  el("asend").onclick = analystSend;
  el("amsg").addEventListener("keydown",e=>{ if(e.key==="Enter") analystSend(); });
  const examples = ["how many customers per segment?", "total deposits by customer segment",
    "which customers have the most overdrafts?",  // → Analytics
    "what are the overdraft fees?", "when is the Lakewood branch open?", "what's the privacy policy?"]; // → KB
  el("aex").innerHTML = `<span class="mut" style="font-size:12px;align-self:center">try:</span>` +
    examples.map(x=>`<button class="ghost fq">${escapeHtml(x)}</button>`).join("");
  el("aex").querySelectorAll("button.fq").forEach(b=>b.onclick=()=>{ el("amsg").value=b.textContent; analystSend(); });
  pushAChat("a","Ask me anything about FinChat — I'll pull metrics from the governed data products or answer from the bank's policy docs, whichever fits." + (S.persona==="admin" ? "" : " Discover assets with the catalog search above."));
}

async function catalogSearch(){
  const q = el("catq").value.trim(); if(!q) return;
  el("catout").innerHTML = "Searching the catalog…";
  const r = await api("catalog", `search?q=${encodeURIComponent(q)}`);
  if (r.__demo) { el("catout").innerHTML = `<span class="mut">Catalog is unavailable in demo mode (needs the Dataplex catalog + enable_catalog).</span>`; return; }
  if (r.error && !(r.matches&&r.matches.length)) { el("catout").innerHTML = `<span class="mut">Catalog error: ${escapeHtml(r.error)}</span>`; return; }
  const ms = r.matches || [];
  if (!ms.length) { el("catout").innerHTML = `<span class="mut">No catalog assets matched “${escapeHtml(q)}”.</span>`; return; }
  el("catout").innerHTML = ms.map(m=>{
    const a=m.aspects||{}, dp=a["data-product"]||{}, gov=a["governance"]||{}, dc=a["data-contract"]||{}, op=a["operational"]||{};
    const bits=[];
    if(dp.business_domain) bits.push(`domain <b>${escapeHtml(dp.business_domain)}</b>`);
    if(dp.criticality) bits.push(`criticality ${escapeHtml(dp.criticality)}`);
    if(dp.certification_status) bits.push(`<span class="pill ${dp.certification_status==='CERTIFIED'?'ok':'warn'}">${escapeHtml(dp.certification_status)}</span>`);
    if(gov.pii_classification) bits.push(`PII ${escapeHtml(gov.pii_classification)}`);
    if(dc.contract_version) bits.push(`contract v${escapeHtml(dc.contract_version)}`);
    if(op.data_quality_score) bits.push(`DQ ${escapeHtml(op.data_quality_score)}`);
    if(dp.product_owner) bits.push(`owner ${escapeHtml(dp.product_owner)}`);
    return `<div class="card" style="margin:8px 0">
      <div class="row" style="justify-content:space-between"><b>${escapeHtml(m.name)}</b>
        <span class="pill">${escapeHtml(m.entry_type||'entry')}</span></div>
      <div class="mut" style="font-size:12px;margin-top:4px">${escapeHtml(m.resource||'')}</div>
      ${bits.length?`<div style="margin-top:6px">${bits.join(" &middot; ")}</div>`:`<div class="mut" style="margin-top:6px">No FinChat aspects on this entry.</div>`}
    </div>`;
  }).join("");
}

async function analystSend(){
  const q = el("amsg").value.trim(); if(!q) return;
  pushAChat("u", q); el("amsg").value=""; el("asql").innerHTML="";
  const t = pushAChat("a","Thinking… (routing to analytics or the knowledge base)");
  // Identity propagation: run analytics AS the signed-in user when possible.
  if (S.user && !S.accessTok) await ensureAccessToken();
  // Single agentic endpoint: the BFF classifies intent and routes to CA or KB.
  const r = await api("analyst","ask",{ method:"POST", body:JSON.stringify({ message:q }) });
  if (r.__demo) { t.querySelector(".b").textContent = "The analyst assistant isn't available in demo mode (needs Gemini Data Analytics + the RAG agent)."; return; }
  if (r.action === "request_access") {
    t.querySelector(".b").innerHTML = `<span class="pill warn">🔒 access</span> ${escapeHtml(r.error)}`
      + (r.request_url ? ` <a href="${r.request_url}" target="_blank" style="color:var(--acc)">Request access →</a>` : "");
    return;
  }
  if (r.error) { t.querySelector(".b").textContent = "Error: " + escapeHtml(r.error) + (r.detail?` — ${escapeHtml(r.detail)}`:""); return; }
  const badge = r.mode === "kb"
    ? `<span class="pill ok">📚 Knowledge Base</span> `
    : `<span class="pill ok">📊 Analytics</span> `;
  t.querySelector(".b").innerHTML = badge + escapeHtml(r.answer || "(no answer)");
  let html="";
  if (r.sql) html += `<details class="sqlbox"><summary>Generated SQL</summary><pre>${escapeHtml(r.sql)}</pre></details>`;
  if (r.rows && r.rows.length){ const cols = r.columns && r.columns.length ? r.columns : Object.keys(r.rows[0]);
    html += `<label>Result (${r.rows.length} rows)</label><table><thead><tr>${cols.map(c=>`<th>${escapeHtml(c)}</th>`).join("")}</tr></thead><tbody>${
      r.rows.slice(0,20).map(row=>`<tr>${cols.map(c=>`<td>${fmtCell(row[c])}</td>`).join("")}</tr>`).join("")}</tbody></table>`; }
  if (r.followups && r.followups.length) html += `<label>Suggested questions</label><div class="row">${
    r.followups.map(f=>`<button class="ghost fq">${escapeHtml(f)}</button>`).join("")}</div>`;
  if (r.vega) html += `<label>Chart</label><div id="vegachart" style="background:#fff;border-radius:8px;padding:10px;overflow:auto"></div>`;
  el("asql").innerHTML = html;
  el("asql").querySelectorAll("button.fq").forEach(b=>b.onclick=()=>{ el("amsg").value=b.textContent; analystSend(); });
  if (r.vega && window.vegaEmbed) {
    try { window.vegaEmbed("#vegachart", r.vega, {actions:false}); }
    catch(e){ const c=el("vegachart"); if(c) c.outerHTML=""; }
  }
  el("achat").scrollTop=1e9;
}

// ===== ADMIN =====
// ---------- Durable Reconciliation Steward (Inc 19 / ADR-0021) ----------
const STEWARD_PLAN = ["Gather gold-table partitions for the reconciliation window",
  "Validate records against the active data contracts",
  "Detect and flag reconciliation anomalies",
  "Summarize findings and propose remediation"];
function stewardScore(task){ return /anomal|flag|remediat|approv/i.test(task)?0.4:0.9; }

function renderSteward(){
  const live = S.live && S.live.steward;
  view.innerHTML = `
    <div class="card"><h3>Reconciliation Steward ${live?'<span class="pill ok">LIVE</span>':'<span class="pill">demo</span>'}</h3>
      <div class="mut">Durable long-running agent (Inc 19 · <b>ADR-0021</b>): plans data-quality checks against the data contracts, evaluates every step, <b>sleeps at zero cost</b>, and <b>wakes the approver</b> on low-confidence findings. Survives crashes — resumes from the last checkpoint, no lost work.</div>
      <div class="row" style="margin-top:10px">
        <input id="stgoal" style="flex:1" value="Reconcile yesterday's ledger and flag anomalies">
        <button id="ststart">Start run</button>
        <button class="ghost" id="strefresh">Refresh</button>
      </div>
      ${live?"":'<div class="mut" style="margin-top:8px;font-size:12px">Steward backend not deployed (<code>enable_agent_harness</code> off) — showing an illustrative client-side run.</div>'}
    </div>
    <div class="card" style="margin-top:16px"><h3>Run status</h3><div id="ststatus" class="mut">No run yet — start one above.</div></div>`;
  el("ststart").onclick = stewardStart;
  el("strefresh").onclick = stewardRefresh;
  if (S.steward && S.steward.demo) stewardRenderDemo();
  else if (S.steward && S.steward.wid) stewardPoll();
}

function stewardRender(d){
  const box = el("ststatus"); if(!box) return;
  const phase = d.phase || "pending";
  const pill = phase==="done"?"ok":phase==="awaiting_human"?"warn":"";
  const who = (S.steward&&S.steward.wid)||(S.steward&&S.steward.demo?"demo run":"");
  let html = `<div class="row" style="gap:8px"><span class="pill ${pill}">${phase}</span><span class="mut">${escapeHtml(who)}</span></div>`;
  if(d.plan&&d.plan.length){ html += `<div class="mut" style="margin-top:8px">Plan: ${d.plan.map(escapeHtml).join(" → ")}</div>`; }
  const hist = d.history||[];
  html += `<div style="margin-top:10px">` + hist.map(s=>`
    <div class="row" style="gap:8px"><span class="pill ${(s.score||0)>=0.6?'ok':'bad'}">${(s.score||0).toFixed(2)}</span>
      <b>${escapeHtml(s.task)}</b><span class="mut">${escapeHtml(s.resolution||'auto')}${s.approver?(' · '+escapeHtml(s.approver)):''}</span></div>
    <div class="mut" style="margin:2px 0 10px 0">${escapeHtml(s.result||"")}</div>`).join("") + `</div>`;
  if(phase==="awaiting_human" && d.pending){
    html += `<div class="card" style="margin-top:8px;border-color:var(--warn)"><b>⏸ Escalation — approver review</b>
      <div class="mut" style="margin-top:4px">${escapeHtml(d.pending.task)} · score ${d.pending.score} · ${escapeHtml(d.pending.reason||"")}</div>
      <div class="mut" style="font-size:12px;margin-top:4px">The agent is asleep (zero cost) until you decide — no polling.</div>
      <div class="row" style="margin-top:8px;gap:8px"><button class="ok" id="stapp">Approve</button><button class="bad" id="strej">Reject</button></div></div>`;
  }
  box.innerHTML = html;
  if(el("stapp")) el("stapp").onclick=()=>stewardReview(true);
  if(el("strej")) el("strej").onclick=()=>stewardReview(false);
}

async function stewardStart(){
  const goal = el("stgoal").value;
  const r = await api("steward","runs",{method:"POST",body:JSON.stringify({goal})});
  if(r.__demo){ return stewardDemoStart(goal); }
  S.steward = { wid: r.workflow_id };
  stewardPoll();
}
function stewardRefresh(){ if(S.steward&&S.steward.demo) stewardRenderDemo(); else if(S.steward&&S.steward.wid) stewardPoll(); }
async function stewardReview(approved){
  if(S.steward&&S.steward.demo) return stewardDemoReview(approved);
  await api("steward",`runs/${S.steward.wid}/review`,{method:"POST",
    body:JSON.stringify({approved, note: approved?"Reviewed in console":"Rejected in console"})});
  stewardPoll();
}
function stewardPoll(){
  clearInterval(S._stewardTimer);
  const tick = async ()=>{
    if(!S.steward||!S.steward.wid) return;
    const d = await api("steward",`runs/${S.steward.wid}`);
    if(d.__demo) return;
    stewardRender(d);
    if(d.phase==="done"||d.phase==="awaiting_human") clearInterval(S._stewardTimer);
  };
  tick(); S._stewardTimer = setInterval(tick, 1500);
}

// Client-side simulation mirroring the offline harness heuristic (no backend).
function stewardDemoStart(goal){ S.steward={demo:true,i:0,hist:[],plan:STEWARD_PLAN,phase:"working"}; stewardDemoStep(); }
function stewardDemoStep(){
  const st=S.steward;
  while(st.i < st.plan.length){
    const task=st.plan[st.i], score=stewardScore(task);
    if(score<0.6){ st.phase="awaiting_human"; st.pending={task,score,reason:"low confidence / borderline items — escalate to approver"}; return stewardRenderDemo(); }
    st.hist.push({task,score,result:"Completed. (tool:run_dq_check) rows reconciled, 0 null-key violations.",resolution:"auto"}); st.i++;
  }
  st.phase="done"; st.pending=null; stewardRenderDemo();
}
function stewardDemoReview(approved){
  const st=S.steward, p=st.pending;
  st.hist.push({task:p.task,score:p.score,result:"[UNCERTAIN] 2 borderline items reviewed.",
    resolution:approved?"human_approved":"human_rejected", approver:(S.email||"approver@datadinosaur.com")});
  st.i++; st.pending=null; st.phase="working"; stewardDemoStep();
}
function stewardRenderDemo(){ stewardRender({phase:S.steward.phase,plan:S.steward.plan,history:S.steward.hist,pending:S.steward.pending}); }

// Eastern-time formatter for the Evaluations card (DST-aware via America/New_York).
function fmtET(iso){ try { return new Date(iso).toLocaleString("en-US",{ timeZone:"America/New_York",
  year:"numeric", month:"2-digit", day:"2-digit", hour:"2-digit", minute:"2-digit", hour12:false }) + " ET"; }
  catch(e){ return ""; } }
// Trigger the live-eval scorer on demand (admin), then refresh the card.
async function runEvalsNow(){
  const b = el("evrun"), msg = el("evrunmsg"); if(!b) return;
  const orig = b.textContent; b.disabled = true; b.textContent = "Scoring…";
  if (msg) msg.textContent = "judging recent turns with Gemini…";
  const r = await api("eval","run",{ method:"POST" });
  b.disabled = false; b.textContent = orig;
  if (r.__demo) { if(msg) msg.textContent = "unavailable in demo mode"; return; }
  if (r.error) { if(msg) msg.textContent = "error: " + escapeHtml(r.error); return; }
  if (!r.scored) { if(msg) msg.textContent = "no un-scored turns in the last 7 days"; return; }
  if (msg) msg.textContent = `scored ${r.scored} of ${r.sampled} — refreshing…`;
  renderAdmin();
}
function stat(name, ok){ return `<div class="row" style="justify-content:space-between"><span>${name}</span><span class="pill ${ok?'ok':'warn'}">${ok?'LIVE':'DEMO'}</span></div>`; }

// ---------- identity (Google Sign-In; ADR-0016) ----------
// Signed out -> Customer view (no login needed). Staff sign in with Google; the BFF
// verifies the ID token and maps the email to a persona (approver/analyst/admin).
function initGsi(clientId){
  S.oauthClientId = clientId;
  const s = document.createElement("script");
  s.src = "https://accounts.google.com/gsi/client"; s.async = true; s.defer = true;
  s.onload = () => {
    google.accounts.id.initialize({ client_id: clientId, callback: onGoogleCred, auto_select: true });
    renderAuthUI();
  };
  document.head.appendChild(s);
}
// Identity propagation (ADR-0019): staff grant a one-time OAuth consent so analytics
// queries run AS THEM — BigQuery evaluates their IAM/policy tags (values vs masked
// vs denied). Token cached ~1h; silently re-requested when expired.
function ensureAccessToken(){
  return new Promise((resolve)=>{
    if (!S.user || !S.oauthClientId) return resolve(null);
    if (S.accessTok && S.accessTokExp > Date.now()+60000) return resolve(S.accessTok);
    try {
      const tc = google.accounts.oauth2.initTokenClient({
        client_id: S.oauthClientId,
        scope: "https://www.googleapis.com/auth/cloud-platform",
        hint: S.user.email,
        callback: (resp)=>{
          if (resp && resp.access_token) {
            S.accessTok = resp.access_token;
            S.accessTokExp = Date.now() + ((resp.expires_in||3600)-60)*1000;
            resolve(S.accessTok);
          } else resolve(null);
        },
        error_callback: ()=>resolve(null),
      });
      tc.requestAccessToken({ prompt: "" });
    } catch(e){ resolve(null); }
  });
}
function renderAuthUI(){
  const box = el("authbox");
  if (S.user) {
    box.innerHTML = `<span class="pill ok">${escapeHtml(S.user.email)} · ${escapeHtml(S.user.personaLabel)}</span>
      <button class="ghost" id="signout">Sign out</button>`;
    el("signout").onclick = signOut;
  } else {
    box.innerHTML = `<div id="gsibtn"></div>`;
    try { google.accounts.id.renderButton(el("gsibtn"), { theme:"outline", size:"medium" }); } catch(e){}
  }
}
async function onGoogleCred(resp){
  S.idtok = resp.credential;
  let me = {}; try { me = await (await fetch("/api/me", { headers:{ "X-User-Token": S.idtok } })).json(); } catch(e){}
  if (me.signed_in) {
    S.user = { email: me.email, persona: me.persona, personaLabel: me.persona_label || me.persona };
    S.persona = me.persona;
  } else { S.idtok = null; }
  renderAuthUI(); setTabs();
  // ADR-0019: request the analytics OAuth token right after sign-in so it's ONE
  // login flow — chat never interrupts with a second popup. Silent on repeat
  // logins (cloud-platform already granted to the account). Fire-and-forget; if a
  // popup blocker eats a first-ever grant (non-gesture), the lazy path on first
  // chat still covers it.
  if (S.user) { try { ensureAccessToken(); } catch(e){} }
}
function signOut(){
  S.idtok = null; S.user = null; S.persona = "customer";
  S.accessTok = null; S.accessTokExp = 0;
  try { google.accounts.id.disableAutoSelect(); } catch(e){}
  renderAuthUI(); setTabs();
}

// ---------- boot ----------
(async function(){
  let cfg = {}; try { cfg = await (await fetch("/api/config")).json(); } catch(e){}
  S.live = cfg.live || S.live; S.demo = !(S.live.loan_api||S.live.txn_api||S.live.agent);
  el("demoBadge").classList.toggle("hidden", !S.demo);
  // Prefill a REAL account id (UUID) from the DaaS API so demos hit live data.
  try { const s = await (await fetch("/api/txn/v1/accounts/samples?n=6")).json();
        if (s.account_ids && s.account_ids.length) S.sampleAccounts = s.account_ids; } catch(e){}
  const auth = cfg.auth || {};
  if (auth.enabled && auth.client_id) {
    // Identity-resolved personas: no dropdown; anonymous = Customer, staff sign in.
    el("personaBox").classList.add("hidden");
    S.persona = "customer"; setTabs();
    initGsi(auth.client_id);
  } else {
    // Fallback (no OAuth configured): persona simulation dropdown.
    const personas = cfg.personas || [{id:"customer",label:"Customer"},{id:"employee",label:"Employee (Loan Officer)"},{id:"analyst",label:"Employee (Analyst)"},{id:"admin",label:"Platform Admin"}];
    persona.innerHTML = personas.map(p=>`<option value="${p.id}">${p.label}</option>`).join("");
    persona.onchange = ()=>{ S.persona=persona.value; setTabs(); };
    S.persona = personas[0].id; setTabs();
  }
})();
