name: Build & Deploy

on:
  push:
    branches: [main]
    paths: ["products/**", "ui/**", ".github/workflows/build-deploy.yml"]
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        type: choice
        options: [dev, test, prod]
        default: dev

# Keyless auth to GCP via Workload Identity Federation (no SA keys).
permissions:
  contents: read
  id-token: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    # GitHub Environments gate promotion (required reviewers on test/prod) and
    # supply WIF_PROVIDER/DEPLOY_SA/GCP_* as environment variables. (No job-level
    # `if` guard on those vars — env-scoped vars aren't visible to job-level `if`.)
    environment: ${{ github.event.inputs.environment || 'dev' }}
    env:
      ENV: ${{ github.event.inputs.environment || 'dev' }}
      PROJECT: ${{ vars.GCP_PROJECT }}
      REGION: ${{ vars.GCP_REGION }}
    steps:
      - uses: actions/checkout@v5

      - id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}   # projects/NUM/locations/global/workloadIdentityPools/POOL/providers/PROVIDER
          service_account: ${{ vars.DEPLOY_SA }}                  # finchat-<env>-cicd@PROJECT.iam.gserviceaccount.com

      - uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${REGION}-docker.pkg.dev --quiet

      - name: Build & push images
        run: |
          REPO="${REGION}-docker.pkg.dev/${PROJECT}/finchat-${ENV}-images"
          SHA="${GITHUB_SHA::12}"
          # Bake the latest AgentOps eval report into the UI image (Admin -> Evaluations).
          cp -f eval/reports/latest.json ui/eval_report.json 2>/dev/null || true
          declare -A SVC=(
            [txn-api]=products/transactions/api
            [txn-generator]=products/transactions/generator
            [loan-api]=products/loans/api
            [agent]=products/transactions/agent
            [ui]=ui
          )
          for name in "${!SVC[@]}"; do
            img="${REPO}/${name}:${SHA}"
            echo "::group::build ${name}"
            docker build -t "$img" -t "${REPO}/${name}:latest" "${SVC[$name]}"
            docker push "$img"; docker push "${REPO}/${name}:latest"
            echo "::endgroup::"
          done

      - name: Deploy Cloud Run services
        run: |
          REPO="${REGION}-docker.pkg.dev/${PROJECT}/finchat-${ENV}-images"
          SHA="${GITHUB_SHA::12}"
          deploy() { # name image-name service-account extra-env
            # --cpu-boost: extra CPU during container startup only (no idle cost) —
            # meaningfully shortens Python cold starts on scale-to-zero services.
            gcloud run deploy "finchat-${ENV}-$1" \
              --image "${REPO}/$2:${SHA}" --region "${REGION}" \
              --service-account "finchat-${ENV}-$3@${PROJECT}.iam.gserviceaccount.com" \
              --cpu-boost --quiet $4
          }
          deploy txn-api txn-api txn-api \
            "--set-env-vars=GCP_PROJECT=${PROJECT},GOLD_DATASET=finchat_gold_${ENV},SILVER_DATASET=finchat_silver_${ENV} --no-allow-unauthenticated"
          deploy loan-api loan-api loan-api \
            "--set-env-vars=GCP_PROJECT=${PROJECT},LOANS_DATASET=finchat_loans_${ENV},TXN_API_URL=$(gcloud run services describe finchat-${ENV}-txn-api --region ${REGION} --format='value(status.url)') --no-allow-unauthenticated"
          # ADK agent on Cloud Run (scale-to-zero). Gemini via Vertex (agent SA has aiplatform.user).
          deploy agent agent agent \
            "--set-env-vars=GOOGLE_CLOUD_PROJECT=${PROJECT},GOOGLE_CLOUD_LOCATION=${REGION},GOOGLE_GENAI_USE_VERTEXAI=TRUE,KB_DATASET=finchat_kb_${ENV},TXN_API_URL=$(gcloud run services describe finchat-${ENV}-txn-api --region ${REGION} --format='value(status.url)'),LOAN_API_URL=$(gcloud run services describe finchat-${ENV}-loan-api --region ${REGION} --format='value(status.url)') --memory=1Gi --no-allow-unauthenticated"
          deploy ui ui txn-api \
            "--set-env-vars=LOAN_API_URL=$(gcloud run services describe finchat-${ENV}-loan-api --region ${REGION} --format='value(status.url)'),TXN_API_URL=$(gcloud run services describe finchat-${ENV}-txn-api --region ${REGION} --format='value(status.url)'),AGENT_URL=$(gcloud run services describe finchat-${ENV}-agent --region ${REGION} --format='value(status.url)'),GCP_PROJECT=${PROJECT},MODEL_ARMOR_LOCATION=${REGION},MODEL_ARMOR_TEMPLATE=finchat-${ENV}-armor,SILVER_DATASET=finchat_silver_${ENV},GOLD_DATASET=finchat_gold_${ENV},LOANS_DATASET=finchat_loans_${ENV},GRAPH_DATASET=finchat_graph_${ENV},KB_DATASET=finchat_kb_${ENV},EVAL_DATASET=finchat_eval_${ENV},DATA_AGENT_ID=finchat-${ENV}-analyst,CA_LOCATION=global,VERTEX_LOCATION=${REGION},GOOGLE_OAUTH_CLIENT_ID=240219253111-nj35dnaod2mdccu6d81v98urp9h7se72.apps.googleusercontent.com,APPROVER_EMAILS=jeremy@datadinosaur.com,ANALYST_EMAILS=jdegardeyn@datadinosaur.com,ADMIN_EMAILS=datadinosaur.noreply@gmail.com --allow-unauthenticated"

      - name: Build Dataflow Flex Template
        # Non-fatal: needs storage/dataflow perms on the CI/CD SA (granted in
        # foundation). If it fails, services still deploy; build the template manually.
        continue-on-error: true
        run: |
          REPO="${REGION}-docker.pkg.dev/${PROJECT}/finchat-${ENV}-images"
          SHA="${GITHUB_SHA::12}"
          docker build -t "${REPO}/txn-pipeline:${SHA}" products/transactions/pipeline
          docker push "${REPO}/txn-pipeline:${SHA}"
          gcloud dataflow flex-template build \
            "gs://finchat-${ENV}-dataflow/templates/txn-pipeline.json" \
            --image "${REPO}/txn-pipeline:${SHA}" --sdk-language PYTHON \
            --metadata-file products/transactions/pipeline/metadata.json
